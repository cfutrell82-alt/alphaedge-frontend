<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlphaEdge — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --navy:#050816; --navy-card:#0b1630; --navy-border:#24335f; --cyan:#00e5ff; --gold:#f7c948; --green:#00E676; --red:#FF4B4B; --text:#fdfdff; --text-muted:#b7c0e8; --text-dim:#3A4A6B; }
  body { background: radial-gradient(circle at top, #1b2b5a 0%, #050816 55%, #000000 100%); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  nav { display:flex; align-items:center; padding:0 40px; height:64px; border-bottom:1px solid var(--navy-border); background:linear-gradient(90deg,rgba(10,20,60,0.95),rgba(10,40,90,0.95)); backdrop-filter:blur(12px); }
  .nav-logo { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:1.2rem; color:var(--text); text-decoration:none; display:flex; align-items:center; gap:8px; }
  .nav-logo span { color:var(--cyan); }
  .nav-logo-coin { width:26px; height:26px; border-radius:50%; box-shadow:0 0 10px rgba(247,201,72,0.8); }
  .main { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
  .auth-card { background:var(--navy-card); border:1px solid var(--navy-border); border-radius:20px; padding:40px; width:100%; max-width:420px; position:relative; overflow:hidden; }
  .auth-card::before { content:''; display:block; height:3px; margin:-40px -40px 36px; background:linear-gradient(90deg,#f7c948,#00e5ff); }
  .auth-title { font-family:'Space Grotesk',sans-serif; font-size:1.6rem; font-weight:700; margin-bottom:6px; }
  .auth-sub { color:var(--text-muted); font-size:0.875rem; margin-bottom:28px; }
  .form-group { margin-bottom:16px; }
  .form-label { display:block; font-size:0.78rem; font-weight:500; color:var(--text-muted); margin-bottom:6px; }
  .form-input { width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--navy-border); border-radius:8px; padding:12px 14px; color:var(--text); font-family:'Inter',sans-serif; font-size:0.9rem; outline:none; transition:border-color 0.2s; }
  .form-input:focus { border-color:var(--cyan); }
  .form-input::placeholder { color:var(--text-dim); }
  .submit-btn { width:100%; padding:13px; background:linear-gradient(90deg,#f7c948,#00e5ff); color:#02040a; border:none; border-radius:10px; font-family:'Space Grotesk',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; transition:all 0.2s; }
  .submit-btn:hover { transform:translateY(-1px); box-shadow:0 0 20px rgba(0,229,255,0.4); }
  .submit-btn:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
  .error-msg { background:rgba(255,75,75,0.1); border:1px solid rgba(255,75,75,0.3); border-radius:8px; padding:10px 14px; font-size:0.82rem; color:var(--red); margin-bottom:16px; display:none; }
  .success-msg { background:rgba(0,230,118,0.1); border:1px solid rgba(0,230,118,0.3); border-radius:8px; padding:10px 14px; font-size:0.82rem; color:var(--green); margin-bottom:16px; display:none; }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo"><img src="alphaedge-coin.png" alt="AEC" class="nav-logo-coin">Alpha<span>Edge</span></a>
</nav>
<div class="main">
  <div class="auth-card">
    <div class="auth-title">Set new password 🔑</div>
    <div class="auth-sub">Enter your new password below.</div>
    <div class="error-msg" id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>
    <div class="form-group">
      <label class="form-label">New Password</label>
      <input type="password" class="form-input" id="password" placeholder="Min. 8 characters">
    </div>
    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <input type="password" class="form-input" id="confirm-password" placeholder="Repeat password">
    </div>
    <button class="submit-btn" id="reset-btn" onclick="handleReset()">Update Password</button>
  </div>
</div>
<script>
const BACKEND = 'https://alphaedge-backend-uu13.onrender.com';
const token = new URLSearchParams(window.location.search).get('token');
if (!token) {
  document.getElementById('error-msg').textContent = 'Invalid reset link. Please request a new one.';
  document.getElementById('error-msg').style.display = 'block';
  document.getElementById('reset-btn').disabled = true;
}
async function handleReset() {
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm-password').value;
  const btn = document.getElementById('reset-btn');
  const errEl = document.getElementById('error-msg');
  const sucEl = document.getElementById('success-msg');
  errEl.style.display='none'; sucEl.style.display='none';
  if (!password || password.length < 8) { errEl.textContent='Password must be at least 8 characters.'; errEl.style.display='block'; return; }
  if (password !== confirm) { errEl.textContent='Passwords do not match.'; errEl.style.display='block'; return; }
  btn.disabled=true; btn.textContent='Updating...';
  try {
    const res = await fetch(`${BACKEND}/api/auth/reset-password`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token,password}) });
    const data = await res.json();
    if (res.ok) {
      sucEl.textContent='Password updated! Redirecting to login...'; sucEl.style.display='block';
      setTimeout(()=>window.location.href='alphaedge-login.html', 2000);
    } else {
      errEl.textContent=data.error||'Reset failed. Please try again.'; errEl.style.display='block';
      btn.disabled=false; btn.textContent='Update Password';
    }
  } catch(e) {
    errEl.textContent='Network error. Please try again.'; errEl.style.display='block';
    btn.disabled=false; btn.textContent='Update Password';
  }
}
</script>
</body>
</html>

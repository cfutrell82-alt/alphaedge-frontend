<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlphaEdge — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0A0F1E; --navy-card: #111827; --navy-border: #1E2D45;
    --navy-hover: #1A2640; --cyan: #00D4FF; --gold: #F4B942;
    --green: #00E676; --red: #FF4B4B; --text: #E8EDF5;
    --text-muted: #6B7FA3; --text-dim: #3A4A6B;
  }
  body { background: var(--navy); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

  nav { display: flex; align-items: center; justify-content: space-between; padding: 0 40px; height: 64px; border-bottom: 1px solid var(--navy-border); background: rgba(10,15,30,0.96); }
  .nav-logo { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.2rem; color: var(--text); text-decoration: none; }
  .nav-logo span { color: var(--cyan); }
  .nav-right { font-size: 0.85rem; color: var(--text-muted); }
  .nav-right a { color: var(--cyan); text-decoration: none; }
  .nav-right a:hover { text-decoration: underline; }

  .page-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }

  .auth-card {
    background: var(--navy-card); border: 1px solid var(--navy-border);
    border-radius: 20px; padding: 40px; width: 100%; max-width: 420px;
    position: relative; overflow: hidden;
  }
  .auth-card::before {
    content: ''; display: block; height: 2px;
    margin: -40px -40px 36px;
    background: linear-gradient(90deg, var(--cyan), transparent 60%);
  }

  .auth-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; }
  .auth-sub { font-size: 0.875rem; color: var(--text-muted); margin-bottom: 28px; }

  .social-btn {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 11px; border-radius: 10px; border: 1px solid var(--navy-border);
    background: rgba(255,255,255,0.03); color: var(--text); font-size: 0.9rem; font-weight: 500;
    cursor: pointer; transition: all 0.2s; margin-bottom: 10px; text-decoration: none;
  }
  .social-btn:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); }
  .social-icon { width: 20px; height: 20px; }

  .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
  .divider hr { flex: 1; border: none; border-top: 1px solid var(--navy-border); }
  .divider span { font-size: 0.78rem; color: var(--text-dim); }

  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 0.78rem; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.02em; }
  .form-input {
    width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--navy-border);
    border-radius: 8px; padding: 11px 14px; color: var(--text);
    font-family: 'Inter', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.2s;
  }
  .form-input::placeholder { color: var(--text-dim); }
  .form-input:focus { border-color: var(--cyan); }

  .forgot { text-align: right; margin-top: -10px; margin-bottom: 16px; }
  .forgot a { font-size: 0.78rem; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
  .forgot a:hover { color: var(--cyan); }

  .submit-btn {
    width: 100%; padding: 13px; background: var(--cyan); color: var(--navy);
    border: none; border-radius: 10px; font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .submit-btn:hover { background: #33DDFF; transform: translateY(-1px); }
  .submit-btn:disabled { background: var(--text-dim); cursor: not-allowed; transform: none; }
  .spinner { width: 18px; height: 18px; border: 2px solid rgba(10,15,30,0.3); border-top-color: var(--navy); border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
  .submit-btn.loading .spinner { display: block; }
  .submit-btn.loading .btn-text { opacity: 0.6; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .form-error { color: var(--red); font-size: 0.8rem; margin-top: 8px; min-height: 18px; text-align: center; }

  .auth-footer { text-align: center; margin-top: 24px; font-size: 0.85rem; color: var(--text-muted); }
  .auth-footer a { color: var(--cyan); text-decoration: none; font-weight: 500; }
  .auth-footer a:hover { text-decoration: underline; }

  .terms-note { text-align: center; margin-top: 16px; font-size: 0.75rem; color: var(--text-dim); line-height: 1.5; }
  .terms-note a { color: var(--text-muted); text-decoration: none; }
  .terms-note a:hover { color: var(--text); }

  footer { padding: 20px 40px; border-top: 1px solid var(--navy-border); display: flex; justify-content: center; gap: 24px; }
  footer a { font-size: 0.8rem; color: var(--text-muted); text-decoration: none; }
  footer a:hover { color: var(--text); }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Alpha<span>Edge</span></a>
  <div class="nav-right">Don't have an account? <a href="alphaedge-signup.html">Sign up free</a></div>
</nav>

<div class="page-wrap">
  <div class="auth-card">
    <div class="auth-title">Welcome back</div>
    <p class="auth-sub">Sign in to your AlphaEdge account</p>

    <button class="social-btn" onclick="handleSocial('google')">
      <svg class="social-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>

    <button class="social-btn" onclick="handleSocial('apple')">
      <svg class="social-icon" viewBox="0 0 24 24" fill="var(--text)"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
      Continue with Apple
    </button>

    <div class="divider"><hr><span>or sign in with email</span><hr></div>

    <div class="form-group">
      <label class="form-label">Email address</label>
      <input type="email" class="form-input" id="email" placeholder="you@example.com" autocomplete="email">
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')handleLogin()">
    </div>

    <div class="forgot"><a href="alphaedge-forgot-password.html">Forgot password?</a></div>

    <button class="submit-btn" id="login-btn" onclick="handleLogin()">
      <div class="spinner"></div>
      <span class="btn-text">Sign in</span>
    </button>

    <div class="form-error" id="login-error"></div>

    <div class="auth-footer">
      Don't have an account? <a href="alphaedge-signup.html">Create one free</a>
    </div>

    <div class="terms-note">
      By signing in you agree to our <a href="alphaedge-terms.html">Terms of Service</a> and <a href="alphaedge-privacy.html">Privacy Policy</a>.
    </div>
  </div>
</div>

<footer>
  <a href="alphaedge-terms.html">Terms</a>
  <a href="alphaedge-privacy.html">Privacy</a>
  <a href="alphaedge-about.html">About</a>
</footer>

<script>
const BACKEND = 'https://alphaedge-backend-uu13.onrender.com';

async function handleLogin() {
  const btn = document.getElementById('login-btn');
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('login-error');

  errorEl.textContent = '';

  if (!email || !email.includes('@')) { errorEl.textContent = 'Please enter a valid email address.'; return; }
  if (!password) { errorEl.textContent = 'Please enter your password.'; return; }

  btn.classList.add('loading'); btn.disabled = true;

  try {
    const res = await fetch(`${BACKEND}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || 'Invalid email or password.');
    localStorage.setItem('ae_token', data.token);
    localStorage.setItem('ae_user', JSON.stringify(data.user));
    window.location.href = 'alphaedge-dashboard.html';
  } catch (err) {
    errorEl.textContent = err.message || 'Something went wrong. Please try again.';
    btn.classList.remove('loading'); btn.disabled = false;
  }
}

function handleSocial(provider) {
  window.location.href = `${BACKEND}/api/auth/${provider}`;
}
</script>
</body>
</html>

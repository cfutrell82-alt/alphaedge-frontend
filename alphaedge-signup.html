<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlphaEdge — Create Account</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --navy:#050816; --navy-card:#0b1630; --navy-border:#24335f; --navy-hover:#0f1f40; --cyan:#00e5ff; --gold:#f7c948; --green:#00E676; --red:#FF4B4B; --text:#fdfdff; --text-muted:#b7c0e8; --text-dim:#3A4A6B; }
  body { background: radial-gradient(circle at top, #1b2b5a 0%, #050816 55%, #000000 100%); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  nav { display:flex; align-items:center; justify-content:space-between; padding:0 40px; height:64px; border-bottom:1px solid var(--navy-border); background:linear-gradient(90deg,rgba(10,20,60,0.95),rgba(10,40,90,0.95)); backdrop-filter:blur(12px); }
  .nav-logo { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:1.2rem; color:var(--text); text-decoration:none; display:flex; align-items:center; gap:8px; }
  .nav-logo span { color:var(--cyan); }
  .nav-logo-coin { width:26px; height:26px; border-radius:50%; box-shadow:0 0 10px rgba(247,201,72,0.8); }
  .main { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
  .auth-card { background:var(--navy-card); border:1px solid var(--navy-border); border-radius:20px; padding:40px; width:100%; max-width:440px; position:relative; overflow:hidden; }
  .auth-card::before { content:''; display:block; height:3px; margin:-40px -40px 36px; background:linear-gradient(90deg,#f7c948,#00e5ff); }
  .auth-title { font-family:'Space Grotesk',sans-serif; font-size:1.6rem; font-weight:700; margin-bottom:6px; }
  .auth-sub { color:var(--text-muted); font-size:0.875rem; margin-bottom:28px; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .form-group { margin-bottom:16px; }
  .form-label { display:block; font-size:0.78rem; font-weight:500; color:var(--text-muted); margin-bottom:6px; }
  .form-input { width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--navy-border); border-radius:8px; padding:12px 14px; color:var(--text); font-family:'Inter',sans-serif; font-size:0.9rem; outline:none; transition:border-color 0.2s; }
  .form-input:focus { border-color:var(--cyan); }
  .form-input::placeholder { color:var(--text-dim); }
  .submit-btn { width:100%; padding:13px; background:linear-gradient(90deg,#f7c948,#00e5ff); color:#02040a; border:none; border-radius:10px; font-family:'Space Grotesk',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; transition:all 0.2s; margin-top:4px; }
  .submit-btn:hover { transform:translateY(-1px); box-shadow:0 0 20px rgba(0,229,255,0.4); }
  .submit-btn:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
  .auth-footer { text-align:center; margin-top:20px; font-size:0.85rem; color:var(--text-muted); }
  .auth-footer a { color:var(--cyan); text-decoration:none; font-weight:500; }
  .error-msg { background:rgba(255,75,75,0.1); border:1px solid rgba(255,75,75,0.3); border-radius:8px; padding:10px 14px; font-size:0.82rem; color:var(--red); margin-bottom:16px; display:none; }
  .success-msg { background:rgba(0,230,118,0.1); border:1px solid rgba(0,230,118,0.3); border-radius:8px; padding:10px 14px; font-size:0.82rem; color:var(--green); margin-bottom:16px; display:none; }
  .terms-note { font-size:0.75rem; color:var(--text-dim); text-align:center; margin-top:12px; }
  .terms-note a { color:var(--cyan); text-decoration:none; }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo"><img src="alphaedge-coin.png" alt="AEC" class="nav-logo-coin">Alpha<span>Edge</span></a>
</nav>
<div class="main">
  <div class="auth-card">
    <div class="auth-title">Create your account 🚀</div>
    <div class="auth-sub">Start trading with AlphaEdge — free forever, upgrade when ready.</div>
    <div class="error-msg" id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>
    
      <a href="https://alphaedge-backend-production.up.railway.app/api/auth/google" style="display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;background:rgba(255,255,255,0.05);border:1px solid var(--navy-border);border-radius:10px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:0.9rem;text-decoration:none;transition:all 0.2s;margin-bottom:16px;" onmouseover="this.style.borderColor='var(--cyan)'" onmouseout="this.style.borderColor='var(--navy-border)'">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Sign up with Google
      </a>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;color:var(--text-dim);font-size:0.78rem;"><div style="flex:1;height:1px;background:var(--navy-border)"></div>or<div style="flex:1;height:1px;background:var(--navy-border)"></div></div><div class="form-row">
      <div class="form-group"><label class="form-label">First name</label><input type="text" class="form-input" id="firstName" placeholder="Curtis"></div>
      <div class="form-group"><label class="form-label">Last name</label><input type="text" class="form-input" id="lastName" placeholder="Futrell"></div>
    </div>
    <div class="form-group"><label class="form-label">Email address</label><input type="email" class="form-input" id="email" placeholder="you@example.com"></div>
    <div class="form-group"><label class="form-label">Password</label><input type="password" class="form-input" id="password" placeholder="Min. 8 characters"></div>
    <button class="submit-btn" id="signup-btn" onclick="handleSignup()">Create free account</button>
    <div class="terms-note">By signing up you agree to our <a href="alphaedge-terms.html">Terms</a> and <a href="alphaedge-privacy.html">Privacy Policy</a>.</div>
    <div class="auth-footer" style="margin-top:16px;">Already have an account? <a href="alphaedge-login.html">Sign in</a></div>
  </div>
</div>
<script>
const BACKEND = 'https://alphaedge-backend-production.up.railway.app';
async function handleSignup() {
  const firstName = document.getElementById('firstName').value.trim();
  const lastName = document.getElementById('lastName').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('signup-btn');
  const errEl = document.getElementById('error-msg');
  const sucEl = document.getElementById('success-msg');
  errEl.style.display='none'; sucEl.style.display='none';
  if (!firstName||!lastName) { errEl.textContent='Please enter your first and last name.'; errEl.style.display='block'; return; }
  if (!email||!email.includes('@')) { errEl.textContent='Please enter a valid email.'; errEl.style.display='block'; return; }
  if (!password||password.length<8) { errEl.textContent='Password must be at least 8 characters.'; errEl.style.display='block'; return; }
  btn.disabled=true; btn.textContent='Creating account...';
  try {
    const res = await fetch(`${BACKEND}/api/auth/signup`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({firstName,lastName,email,password}) });
    const data = await res.json();
    if (res.ok) {
      localStorage.setItem('ae_token', data.token);
      localStorage.setItem('ae_user', JSON.stringify(data.user));
      sucEl.textContent='Account created! Redirecting to dashboard...'; sucEl.style.display='block';
      setTimeout(()=>window.location.href='alphaedge-dashboard.html', 1200);
    } else {
      errEl.textContent=data.error||'Signup failed. Please try again.'; errEl.style.display='block';
      btn.disabled=false; btn.textContent='Create free account';
    }
  } catch(e) {
    errEl.textContent='Network error. Please try again.'; errEl.style.display='block';
    btn.disabled=false; btn.textContent='Create free account';
  }
}
document.addEventListener('keypress',e=>{ if(e.key==='Enter') handleSignup(); });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlickOptions — Sign In</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#9945FF">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --cyan: #9945FF; --purple: #9945FF; --sol-green: #14F195; --gold: #14F195; --navy: #0a1628; --navy-mid: #1a2744; --bg: #f8faff; --border: #e2e8f4; --text: #0a1628; --text-muted: #4b5e82; --red: #FF4B4B; --green: #00C853; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  nav { display: flex; align-items: center; justify-content: space-between; padding: 0 40px; height: 64px; background: rgba(255,255,255,0.97); border-bottom: 1px solid var(--border); }
  .nav-logo { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.1rem; color: var(--navy); text-decoration: none; display: flex; align-items: center; gap: 8px; }
  .nav-logo img { width: 28px; height: 28px; border-radius: 50%; box-shadow: 0 0 8px rgba(153,69,255,0.5); }
  .nav-logo .accent { color: var(--purple); }
  .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  .auth-card { background: #fff; border: 1px solid var(--border); border-radius: 20px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 8px 40px rgba(0,0,0,0.08); position: relative; overflow: hidden; }
  .auth-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--purple), var(--sol-green)); }
  .auth-logo { display: flex; align-items: center; justify-content: center; margin-bottom: 24px; }
  .auth-logo img { width: 48px; height: 48px; border-radius: 50%; box-shadow: 0 0 16px rgba(20,241,149,0.5); }
  .auth-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; text-align: center; margin-bottom: 6px; color: var(--navy); }
  .auth-sub { font-size: 0.85rem; color: var(--text-muted); text-align: center; margin-bottom: 28px; }
  .google-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 12px; background: #fff; border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 0.9rem; text-decoration: none; transition: all 0.2s; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); cursor: pointer; }
  .google-btn:hover { border-color: var(--purple); box-shadow: 0 4px 14px rgba(153,69,255,0.15); }
  .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; color: var(--text-muted); font-size: 0.78rem; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 0.78rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 6px; }
  .form-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.15s; }
  .form-input:focus { border-color: var(--purple); background: #fff; box-shadow: 0 0 0 3px rgba(153,69,255,0.1); }
  .forgot { font-size: 0.78rem; color: var(--text-muted); text-align: right; margin-bottom: 18px; display: block; text-decoration: none; }
  .forgot:hover { color: var(--purple); }
  .submit-btn { width: 100%; padding: 12px; background: linear-gradient(90deg, var(--purple), var(--sol-green)); color: var(--navy); border: none; border-radius: 10px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 14px rgba(153,69,255,0.25); }
  .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(153,69,255,0.35); }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .auth-footer { text-align: center; margin-top: 20px; font-size: 0.84rem; color: var(--text-muted); }
  .auth-footer a { color: var(--purple); text-decoration: none; font-weight: 600; }
  .error-msg { background: rgba(255,75,75,0.08); border: 1px solid rgba(255,75,75,0.25); border-radius: 8px; padding: 10px 14px; font-size: 0.82rem; color: var(--red); margin-bottom: 14px; display: none; }
  .success-msg { background: rgba(0,200,83,0.08); border: 1px solid rgba(0,200,83,0.25); border-radius: 8px; padding: 10px 14px; font-size: 0.82rem; color: var(--green); margin-bottom: 14px; display: none; }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">
    <img src="so-coin.png" alt="SO">
    Slick<span class="accent">Options</span>
  </a>
  <a href="slickoptions-signup.html" style="font-size:0.85rem;color:var(--text-muted);text-decoration:none;">No account? <span style="color:var(--purple);font-weight:600;">Sign up free</span></a>
</nav>
<div class="main">
  <div class="auth-card">
    <div class="auth-logo"><img src="so-coin.png" alt="SlickOptions"></div>
    <div class="auth-title">Welcome back</div>
    <div class="auth-sub">Sign in to your SlickOptions dashboard</div>
    <div class="error-msg" id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>
    <a href="https://alphaedge-backend-production.up.railway.app/api/auth/google" class="google-btn">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </a>
    <div class="divider">or</div>
    <div class="form-group">
      <label class="form-label">Email address</label>
      <input type="email" class="form-input" id="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="password" placeholder="••••••••••">
    </div>
    <a href="slickoptions-reset-password.html" class="forgot">Forgot password?</a>
    <button class="submit-btn" id="login-btn" onclick="doLogin()">Sign in</button>
    <div class="auth-footer">Don't have an account? <a href="slickoptions-signup.html">Sign up free</a></div>
  </div>
</div>
<script>
const BACKEND = 'https://alphaedge-backend-production.up.railway.app';
// Handle Google OAuth redirect
(function(){
  const p = new URLSearchParams(window.location.search);
  const t = p.get('token'), u = p.get('user'), err = p.get('error');
  if (t && u) { localStorage.setItem('ae_token', t); localStorage.setItem('ae_user', decodeURIComponent(u)); window.location.href = 'slickoptions-dashboard.html'; }
  if (err) { showError('Google sign in failed. Please try again.'); }
})();
function showError(msg) { const el = document.getElementById('error-msg'); el.textContent = msg; el.style.display = 'block'; }
function showSuccess(msg) { const el = document.getElementById('success-msg'); el.textContent = msg; el.style.display = 'block'; }
async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  if (!email || !password) return showError('Please enter your email and password.');
  btn.disabled = true; btn.textContent = 'Signing in...';
  try {
    const res = await fetch(`${BACKEND}/api/auth/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
    const data = await res.json();
    if (data.token) {
      localStorage.setItem('ae_token', data.token);
      localStorage.setItem('ae_user', JSON.stringify(data.user));
      window.location.href = 'slickoptions-dashboard.html';
    } else { showError(data.error || 'Login failed. Please try again.'); btn.disabled = false; btn.textContent = 'Sign in'; }
  } catch(e) { showError('Connection error. Please try again.'); btn.disabled = false; btn.textContent = 'Sign in'; }
}
document.addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
